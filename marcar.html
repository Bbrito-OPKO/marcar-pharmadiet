<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcar visita — Pharmadiet Veterinary</title>
<meta property="og:title" content="Marcar visita — Pharmadiet Veterinary">
<meta property="og:description" content="Escolha o dia e a hora que lhe der mais jeito para a visita da Pharmadiet.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#175FAA">
<style>
  :root{--navy:#175FAA;--navy-d:#134F8E;--green:#87BA25;--green-d:#6f9a1e;--ink:#2B3441;--muted:#6C7889;--line:#E2E8F0;--bg:#F4F7FB}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink)}
  .wrap{max-width:520px;margin:0 auto;padding:24px 16px 48px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;color:var(--navy);font-size:18px;margin-bottom:18px}
  .brand .dot{width:12px;height:12px;border-radius:50%;background:var(--green)}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 28px rgba(20,40,70,.06);padding:22px 20px}
  h1{font-size:19px;margin:0 0 6px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 16px;line-height:1.5}
  .cal-h{font-weight:800;color:var(--navy);font-size:16px;text-transform:capitalize;margin-bottom:10px}
  .dow{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px}
  .dow span{text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .cell{aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:15px;border-radius:12px;color:#C5CED9}
  .cell small{font-size:9px;line-height:1;margin-top:1px;opacity:.8}
  .cell.avail{background:#EAF2FB;color:var(--navy);font-weight:800;cursor:pointer;border:1.5px solid transparent;transition:.15s}
  .cell.avail:hover{border-color:#9CC0E8}
  .cell.avail.dot::after{content:"";width:5px;height:5px;border-radius:50%;background:var(--green);margin-top:2px}
  .cell.sel{background:var(--navy);color:#fff}
  .cell.sel.dot::after{background:#fff}
  .times{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;display:none}
  .times.show{display:block}
  .times-h{font-weight:800;color:var(--navy);font-size:15px;text-transform:capitalize;margin-bottom:10px}
  .busy{background:#F1F4F8;color:#8A96A6;border:1px dashed var(--line);border-radius:10px;padding:7px 12px;margin-bottom:8px;font-size:13px;font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:9px 18px;font-size:15px;font-weight:800;color:var(--navy);cursor:pointer;transition:.15s}
  .chip:hover{border-color:#9CC0E8;background:#F3F8FF}
  .chip.sel{border-color:var(--navy);background:var(--navy);color:#fff}
  .confirm{margin-top:14px;display:none}
  .confirm.show{display:block}
  .confirm p{font-size:14px;color:var(--ink);margin:6px 0 12px;line-height:1.5}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:10px;text-decoration:none;color:#fff}
  .btn.wa{background:#25D366}.btn.wa:hover{background:#1FB855}
  .btn.mail{background:var(--navy)}.btn.mail:hover{background:var(--navy-d)}
  .btn.cal{background:#fff;color:var(--navy);border:1.5px solid var(--navy)}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:18px}
  .err{color:#C0392B;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"></span> Pharmadiet Veterinary</div>
  <div class="card" id="card"><p class="err">A carregar…</p></div>
  <div class="foot">Marcação de visita comercial · Pharmadiet</div>
</div>
<script>
var DEFAULT_R='https://script.google.com/macros/s/AKfycbzedS0F01jmcMy-mLf4deECfyUr5feSak9e1M5NHlccfUU4dC1dpwNxmg722aRKjBej7g/exec';
var DEFAULT_W='351925110587';
var DEFAULT_E='bbrito@opko.com';
var WD=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
var DOW=['Seg','Ter','Qua','Qui','Sex'];
var MES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
var MESc=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function dec(q){if(!q)return null;try{return JSON.parse(decodeURIComponent(escape(atob(q))));}catch(e){try{return JSON.parse(decodeURIComponent(q));}catch(_){return null;}}}
function parseD(iso){var d=iso.slice(0,10).split('-');return new Date(+d[0],+d[1]-1,+d[2]);}
function isoOf(dt){return dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2)+'-'+('0'+dt.getDate()).slice(-2);}
function fmt(iso){var p=iso.split('T');var dt=parseD(p[0]);return {wd:WD[dt.getDay()],dm:p[0].split('-')[2]+'/'+p[0].split('-')[1],hr:(p[1]||'10:00').replace(':00','h').replace(':','h'),date:p[0],time:(p[1]||'10:00')};}
function gcal(c,iso){var p=iso.split('T');var d=p[0].replace(/-/g,'');var t=(p[1]||'10:00');var hh=(+t.split(':')[0]);var mm=t.split(':')[1];var s=d+'T'+t.replace(':','')+'00';var e=d+'T'+String(hh+1)+mm+'00';var txt='Visita Pharmadiet'+(c?(' — '+c):'');return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(txt)+'&dates='+s+'/'+e;}
function render(){
  var card=document.getElementById('card');
  var data=dec(new URLSearchParams(location.search).get('q'));
  // byDate = {iso:{starts:['HH:MM'…], busy:[[iníM,fimM]…]}}.
  // Formato novo: d[[offset,[horas],[[bs,be]]]]. Suporta o antigo (máscara) e ?s legado.
  // Em pr[1]: >=24 = minutos desde a meia-noite (ex. 850 = 14:10, horas flexíveis);
  // <24 = hora inteira (links gerados antes de 2026-07-18, ex. 10 = 10:00).
  var byDate={};
  if(data&&data.d&&data.b){ var base=parseD(data.b); var HRSm=['10:00','11:15','12:30','15:00','16:15'];
    data.d.forEach(function(pr){var dt=new Date(base);dt.setDate(dt.getDate()+pr[0]);var iso=isoOf(dt);var st=[],bz=[];
      if(Object.prototype.toString.call(pr[1])==='[object Array]'){pr[1].forEach(function(v){st.push(m2h(v<24?v*60:v));});bz=pr[2]||[];}
      else{for(var i=0;i<HRSm.length;i++){if(pr[1]&(1<<i))st.push(HRSm[i]);}}
      byDate[iso]={starts:st,busy:bz};});
  } else if(data&&data.s&&data.s.length){ data.s.forEach(function(iso){var dd=iso.slice(0,10),tt=iso.split('T')[1]||'10:00';(byDate[dd]=byDate[dd]||{starts:[],busy:[]}).starts.push(tt);}); }
  var dates=Object.keys(byDate).filter(function(k){return byDate[k].starts.length;}).sort();
  if(!dates.length){card.innerHTML='<h1>Link inválido</h1><p class="sub">Este link de marcação não tem datas. Por favor responda diretamente à mensagem.</p>';return;}
  // wa/e = contactos do Bruno (payload); data.w e o TOKEN de escrita do rele, NUNCA um numero
  // (ate 2026-07-22 usava-se data.w como numero -> o botao WhatsApp gerava wa.me/<token> partido)
  var R=data.r||DEFAULT_R, W=data.wa||DEFAULT_W, E=data.e||DEFAULT_E;
  function m2h(m){var H=Math.floor(m/60),M=m%60;return (H<10?'0':'')+H+':'+(M<10?'0':'')+M;}
  // calendário 3 semanas (Seg–Sex) a partir da segunda da 1.ª semana com vaga
  var start=parseD(dates[0]); var off=(start.getDay()+6)%7; start.setDate(start.getDate()-off);
  var cells=[]; for(var w=0;w<3;w++){for(var wd=0;wd<5;wd++){var dt=new Date(start);dt.setDate(dt.getDate()+w*7+wd);cells.push(isoOf(dt));}}
  var lastc=parseD(cells[cells.length-1]);
  var titulo=MES[start.getMonth()]+(start.getMonth()!==lastc.getMonth()?(' – '+MES[lastc.getMonth()]):'')+' '+lastc.getFullYear();
  var h='<h1>Olá! 👋</h1><p class="sub">Escolha o dia para a visita da Pharmadiet:</p>';
  h+='<div class="cal-h">'+titulo+'</div>';
  h+='<div class="dow">'+DOW.map(function(d){return '<span>'+d+'</span>';}).join('')+'</div><div class="grid">';
  cells.forEach(function(iso){var dt=parseD(iso);var num=dt.getDate();var mlbl=(num===1?('<small>'+MESc[dt.getMonth()]+'</small>'):'');
    if(byDate[iso]&&byDate[iso].starts.length)h+='<div class="cell avail dot" data-iso="'+iso+'">'+num+mlbl+'</div>';
    else h+='<div class="cell">'+num+mlbl+'</div>';});
  h+='</div><div class="times" id="times"></div><div class="confirm" id="cf"></div>';
  card.innerHTML=h;
  var timesEl=document.getElementById('times'), cfEl=document.getElementById('cf');
  card.querySelectorAll('.cell.avail').forEach(function(c){c.onclick=function(){pickDay(c.dataset.iso,c);};});
  function pickDay(iso,cell){
    card.querySelectorAll('.cell').forEach(function(z){z.classList.remove('sel');});
    cell.classList.add('sel'); cfEl.classList.remove('show');cfEl.innerHTML='';
    var f=fmt(iso+'T00:00'); var day=byDate[iso];
    var hh='<div class="times-h">'+f.wd+', '+f.dm+'</div>';
    (day.busy||[]).slice().sort(function(a,b){return a[0]-b[0];}).forEach(function(b){hh+='<div class="busy">Ocupado '+m2h(b[0])+'–'+m2h(b[1])+'</div>';});
    hh+='<div class="chips">';
    day.starts.slice().sort().forEach(function(t){hh+='<button class="chip" data-t="'+t+'">'+t.replace(':00','h').replace(':','h')+'</button>';});
    hh+='</div>';
    timesEl.innerHTML=hh;timesEl.classList.add('show');
    timesEl.querySelectorAll('.chip').forEach(function(b){b.onclick=function(){pickTime(iso,b);};});
    timesEl.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  function pickTime(iso,btn){
    timesEl.querySelectorAll('.chip').forEach(function(z){z.classList.remove('sel');});
    btn.classList.add('sel');
    var isoT=iso+'T'+btn.dataset.t; var f=fmt(isoT);
    var txt='Olá! Confirmo a visita da Pharmadiet'+(data.c?(' à '+data.c):'')+': '+f.wd+', '+f.dm+' às '+f.hr+'. Obrigado!';
    var sent=false;
    // w = segredo de escrita do rele: vem no payload do link (nunca embutido nesta pagina, que e publica)
    if(R){try{fetch(R,{method:'POST',mode:'no-cors',body:JSON.stringify({k:data.k||'',c:data.c||'',slot:isoT,id:data.id||(''+Date.now()),w:data.w||''})});sent=true;}catch(_){}}
    var html=sent
      ?'<p>✓ <b>Pedido enviado</b> — '+f.wd+', '+f.dm+' às '+f.hr+'. O Bruno confirma consigo. Se quiser, avise também por:</p>'
      :'<p>Escolheu <b>'+f.wd+', '+f.dm+' às '+f.hr+'</b>. Toque para confirmar:</p>';
    if(W)html+='<a class="btn wa" href="https://wa.me/'+W+'?text='+encodeURIComponent(txt)+'">✓ Confirmar por WhatsApp</a>';
    if(E)html+='<a class="btn mail" href="mailto:'+E+'?subject='+encodeURIComponent('Confirmação de visita'+(data.c?(' — '+data.c):''))+'&body='+encodeURIComponent(txt)+'">✓ Confirmar por email</a>';
    html+='<a class="btn cal" href="'+gcal(data.c,isoT)+'" target="_blank">📅 Adicionar ao meu calendário</a>';
    cfEl.innerHTML=html;cfEl.classList.add('show');cfEl.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}
render();
</script>
</body>
</html>
