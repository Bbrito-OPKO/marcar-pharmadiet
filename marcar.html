<title>Marcar visita — Pharmadiet Veterinary</title>
<meta property="og:title" content="Marcar visita — Pharmadiet Veterinary">
<meta property="og:description" content="Escolha o dia e a hora que lhe der mais jeito para a visita da Pharmadiet.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#175FAA">
<style>
  :root{--navy:#175FAA;--navy-d:#134F8E;--green:#87BA25;--green-d:#6f9a1e;--ink:#2B3441;--muted:#6C7889;--line:#E2E8F0;--bg:#F4F7FB}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink)}
  .wrap{max-width:900px;margin:0 auto;padding:24px 16px 48px}
  .brand{display:flex;justify-content:center;margin-bottom:18px}
  .brand img{height:46px;max-width:72vw;object-fit:contain}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 28px rgba(20,40,70,.06);padding:24px 22px}
  h1{font-size:20px;margin:0 0 18px}
  .panes{display:grid;grid-template-columns:2fr 1fr;gap:22px;min-height:360px}
  .pane-cal{display:flex;flex-direction:column}
  .pane-times{border-left:1px solid var(--line);padding-left:22px;display:flex;flex-direction:column}
  .cal-h{font-weight:800;color:var(--navy);font-size:17px;text-transform:capitalize;margin-bottom:12px}
  .dow{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:8px}
  .dow span{text-align:center;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;flex:1;grid-auto-rows:minmax(96px,1fr)}
  .cell{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:17px;border-radius:14px;color:#C5CED9}
  .cell small{font-size:10px;line-height:1;margin-top:2px;opacity:.8}
  .cell.avail{background:#EAF2FB;color:var(--navy);font-weight:800;cursor:pointer;border:1.5px solid transparent;transition:.15s}
  .cell.avail:hover{border-color:#9CC0E8}
  .cell.avail.dot::after{content:"";width:6px;height:6px;border-radius:50%;background:var(--green);margin-top:3px}
  .cell.sel{background:var(--navy);color:#fff}
  .cell.sel.dot::after{background:#fff}
  .times-h{font-weight:800;color:var(--navy);font-size:16px;text-transform:capitalize;margin-bottom:12px;text-align:center}
  .hint{color:var(--muted);font-size:14px;line-height:1.5;margin-top:36px;text-align:center}
  .slots{display:flex;flex-direction:column;gap:6px}
  .chip{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:8px 6px;font-size:14px;font-weight:800;color:var(--navy);cursor:pointer;transition:.15s;text-align:center}
  .chip:hover{border-color:#9CC0E8;background:#F3F8FF}
  .chip.sel{border-color:var(--navy);background:var(--navy);color:#fff}
  .sent{background:var(--green);color:#fff;border:2px solid var(--green-d);border-radius:14px;padding:14px 16px;font-size:15px;font-weight:800;line-height:1.45;margin:6px 0 12px;text-align:center}
  .warn{font-size:14px;color:var(--ink);margin:6px 0 12px;line-height:1.5}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:10px;text-decoration:none;color:#fff}
  .btn.cal{background:#fff;color:var(--navy);border:1.5px solid var(--navy)}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:18px}
  .err{color:#C0392B;font-size:14px}
  @media(max-width:759.98px){
    .panes{gap:12px;min-height:300px}
    .pane-times{padding-left:12px}
    .cell{font-size:14px;border-radius:10px}
    .cell small{font-size:9px}
    .dow span{font-size:10px}
    .grid,.dow{gap:5px}
    .grid{grid-auto-rows:minmax(60px,1fr)}
    .chip{padding:7px 5px;font-size:12.5px}
    .times-h{font-size:12.5px}
    .times-h .th-wd{white-space:nowrap}
    .times-h .th-sep{display:none}
    .times-h .th-dm{display:block}
    .hint{margin-top:16px;font-size:13px}
    .cal-h{font-size:15px}
  }
</style>
</head>

<script>
var DEFAULT_R='https://script.google.com/macros/s/AKfycbzedS0F01jmcMy-mLf4deECfyUr5feSak9e1M5NHlccfUU4dC1dpwNxmg722aRKjBej7g/exec';

var WD=['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
var DOW=['Seg','Ter','Qua','Qui','Sex'];
var MES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
var MESc=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function dec(q){if(!q)return null;try{return JSON.parse(decodeURIComponent(escape(atob(q))));}catch(e){try{return JSON.parse(decodeURIComponent(q));}catch(_){return null;}}}
function parseD(iso){var d=iso.slice(0,10).split('-');return new Date(+d[0],+d[1]-1,+d[2]);}
function isoOf(dt){return dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2)+'-'+('0'+dt.getDate()).slice(-2);}
function m2h(m){var H=Math.floor(m/60),M=m%60;return (H<10?'0':'')+H+':'+(M<10?'0':'')+M;}
function fmt(iso){var p=iso.split('T');var dt=parseD(p[0]);return {wd:WD[dt.getDay()],dm:p[0].split('-')[2]+'/'+p[0].split('-')[1],hr:(p[1]||'10:00').replace(':00','h').replace(':','h'),date:p[0],time:(p[1]||'10:00')};}
function gcal(c,iso){var p=iso.split('T');var d=p[0].replace(/-/g,'');var t=(p[1]||'10:00');var ini=(+t.split(':')[0])*60+(+t.split(':')[1]);var fim=ini+DUR_MIN;var s=d+'T'+t.replace(':','')+'00';var e=d+'T'+m2h(fim).replace(':','')+'00';var txt='Visita Pharmadiet'+(c?(' — '+c):'');return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(txt)+'&dates='+s+'/'+e;}
function lsGet(k){try{return localStorage.getItem(k);}catch(_){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(_){}}
function render(){
  var card=document.getElementById('card');
  var data=dec(new URLSearchParams(location.search).get('q'));
  // byDate = {iso:{starts:['HH:MM'…]}}.
  // Formato: d[[offset,[horas],[[bs,be]]]]. Suporta o antigo (máscara) e ?s legado.
  // Em pr[1]: >=24 = minutos desde a meia-noite (ex. 850 = 14:10); <24 = hora inteira
  // (links gerados antes de 2026-07-18, ex. 10 = 10:00). O 3.º elemento (ocupados) dos
  // links antigos é ignorado — a grelha enviada já reflete a agenda e a página não deve
  // expor as marcações do calendário (decisão de segurança 2026-07-23).
  var byDate={};
  if(data&&data.d&&data.b){ var base=parseD(data.b); var HRSm=['10:00','11:15','12:30','15:00','16:15'];
    data.d.forEach(function(pr){var dt=new Date(base);dt.setDate(dt.getDate()+pr[0]);var iso=isoOf(dt);var st=[];
      if(Object.prototype.toString.call(pr[1])==='[object Array]'){pr[1].forEach(function(v){st.push(m2h(v<24?v*60:v));});}
      else{for(var i=0;i<HRSm.length;i++){if(pr[1]&(1<<i))st.push(HRSm[i]);}}
      byDate[iso]={starts:st};});
  } else if(data&&data.s&&data.s.length){ data.s.forEach(function(iso){var dd=iso.slice(0,10),tt=iso.split('T')[1]||'10:00';(byDate[dd]=byDate[dd]||{starts:[]}).starts.push(tt);}); }
  var dates=Object.keys(byDate).filter(function(k){return byDate[k].starts.length;}).sort();
  if(!dates.length){card.innerHTML='<h1>Link inválido</h1><p class="warn">Este link de marcação não tem datas. Por favor responda diretamente à mensagem.</p>';return;}
  // (2026-07-22, decisao do Bruno) os botoes "Confirmar por WhatsApp/email" foram removidos:
  // o rele + confirmacao automatica fecham o ciclo; fica so o "Adicionar ao meu calendario".
  var R=data.r||DEFAULT_R;
  var LSK='pharma_marcado_'+String(data.id||'');
  function done(isoT,reaberto){
    var f=fmt(isoT);
    var html='<div class="sent">✓ '+(reaberto?'Marcação já enviada':'Pedido enviado')+' — '+f.wd+', '+f.dm+' às '+f.hr+'. Confirmo consigo de seguida!</div>';
    html+='<a class="btn cal" href="'+gcal(data.c,isoT)+'" target="_blank">📅 Adicionar ao meu calendário</a>';
    card.innerHTML=html;
  }
  // link já usado neste dispositivo → estado final direto, sem calendário (uso único; o relé
  // descarta de qualquer forma um 2.º pedido com o mesmo id)
  var prev=data.id?lsGet(LSK):null;
  if(prev){done(prev,true);return;}
  // calendário 3 semanas (Seg–Sex) a partir da segunda da 1.ª semana com vaga
  var start=parseD(dates[0]); var off=(start.getDay()+6)%7; start.setDate(start.getDate()-off);
  var cells=[]; for(var w=0;w<3;w++){for(var wd=0;wd<5;wd++){var dt=new Date(start);dt.setDate(dt.getDate()+w*7+wd);cells.push(isoOf(dt));}}
  var lastc=parseD(cells[cells.length-1]);
  var titulo=MES[start.getMonth()]+(start.getMonth()!==lastc.getMonth()?(' – '+MES[lastc.getMonth()]):'')+' '+lastc.getFullYear();
  var h='<div class="panes"><div class="pane-cal">';
  h+='<h1>Olá! 👋 Escolha o dia</h1>';
  h+='<div class="cal-h">'+titulo+'</div>';
  h+='<div class="dow">'+DOW.map(function(d){return '<span>'+d+'</span>';}).join('')+'</div><div class="grid">';
  cells.forEach(function(iso){var dt=parseD(iso);var num=dt.getDate();var mlbl=(num===1?('<small>'+MESc[dt.getMonth()]+'</small>'):'');
    if(byDate[iso]&&byDate[iso].starts.length)h+='<div class="cell avail dot" data-iso="'+iso+'">'+num+mlbl+'</div>';
    else h+='<div class="cell">'+num+mlbl+'</div>';});
  h+='</div></div><div class="pane-times" id="times"><p class="hint">Escolha um dia para ver as horas disponíveis.</p></div></div>';
  card.innerHTML=h;
  var timesEl=document.getElementById('times');
  card.querySelectorAll('.cell.avail').forEach(function(c){c.onclick=function(){pickDay(c.dataset.iso,c);};});
  function pickDay(iso,cell){
    card.querySelectorAll('.cell').forEach(function(z){z.classList.remove('sel');});
    cell.classList.add('sel');
    var f=fmt(iso+'T00:00'); var day=byDate[iso];
    var hh='<div class="times-h"><span class="th-wd">'+f.wd+'</span><span class="th-sep">, </span><span class="th-dm">'+f.dm+'</span></div>';
    hh+='<div class="slots">';
    day.starts.slice().sort().forEach(function(t){hh+='<button class="chip" data-t="'+t+'">'+t.replace(':','h')+'</button>';});
    hh+='</div>';
    timesEl.innerHTML=hh;
    timesEl.querySelectorAll('.chip').forEach(function(b){b.onclick=function(){pickTime(iso,b);};});
    timesEl.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  function pickTime(iso,btn){
    var isoT=iso+'T'+btn.dataset.t;
    var sent=false;
    // w = segredo de escrita do rele: vem no payload do link (nunca embutido nesta pagina, que e publica)
    if(R){try{fetch(R,{method:'POST',mode:'no-cors',body:JSON.stringify({k:data.k||'',c:data.c||'',slot:isoT,id:data.id||(''+Date.now()),w:data.w||''})});sent=true;}catch(_){}}
    if(sent){
      if(data.id)lsSet(LSK,isoT);
      done(isoT,false);
      card.scrollIntoView({behavior:'smooth',block:'start'});
    }else{
      var f=fmt(isoT);
      card.innerHTML='<p class="warn">Escolheu <b>'+f.wd+', '+f.dm+' às '+f.hr+'</b>, mas não foi possível enviar o pedido — por favor responda diretamente à mensagem que recebeu.</p>'
        +'<a class="btn cal" href="'+gcal(data.c,isoT)+'" target="_blank">📅 Adicionar ao meu calendário</a>';
    }
  }
}
render();
</script>
</body>
</html>
